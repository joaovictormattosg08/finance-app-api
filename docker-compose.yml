version: '3'

services:
    postgres:
        image: postgres
        container_name: financeapp-postgres
        environment:
            POSTGRES_PASSWORD: password
            POSTGRES_USER: postgres
            POSTGRES_DB: financeapp
        ports:
            - '5432:5432'
        volumes:
            - ./postgres-data:/var/lib/postgresql/data

    postgres-test:
        image: postgres
        container_name: financeapp-postgres-test
        environment:
            POSTGRES_PASSWORD: password
            POSTGRES_USER: postgres
            POSTGRES_DB: financeapp
        ports:
            - '5433:5433'
